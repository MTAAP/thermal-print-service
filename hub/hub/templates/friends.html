{% extends "base.html" %}
{% block content %}
<section class="view view-friends" data-testid="friends-view">
  <h1 class="view-title">Friends</h1>
  <form method="post" action="/friends/invite" hx-post="/friends/invite"
        hx-target="#invite-slot" hx-swap="innerHTML">
    <button type="submit" data-testid="invite-button">Generate invite code</button>
  </form>
  <div id="invite-slot" class="invite-slot">
    {% if invite_code %}
    {% include "invite_code.html" %}
    {% endif %}
  </div>
  <div id="friends-slot" class="friends-slot">
    {% include "friends_list.html" %}
  </div>
</section>
{% endblock %}
