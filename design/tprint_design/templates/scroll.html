<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Scroll</title>
    <style>
      body { padding: 32px 32px; }
      h1 { font-size: 40px; margin: 0 0 24px 0; }
      h2 { font-size: 22px; border-bottom: 2px solid black;
           padding-bottom: 4px; margin-top: 24px; }
      p { font-size: 18px; line-height: 1.5; }
      .dropcap::first-letter {
        font-size: 64px; line-height: 1; float: left;
        padding-right: 8px; padding-top: 4px; font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>A Scroll</h1>
    <p class="dropcap">The first paragraph wraps around a drop cap. Replace
    this body with whatever long-form text you want to print.</p>
    <h2>A section</h2>
    <p>Section bodies sit beneath their headings.</p>
  </body>
</html>
