name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  printer-core:
    name: printer-core py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install printer-core
        run: python -m pip install -e 'printer-core[dev]'
      - name: Test printer-core
        run: python -m pytest printer-core/tests
      - name: Lint printer-core
        run: python -m ruff check printer-core/printer_core printer-core/tests
      - name: Typecheck printer-core
        run: python -m mypy printer-core/printer_core

  service:
    name: service py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install printer-core (editable sibling for service)
        run: python -m pip install -e ./printer-core
      - name: Install service
        run: python -m pip install -e 'service[dev]'
      - name: Test service
        run: python -m pytest service/tests
      - name: Lint service
        run: python -m ruff check service
      - name: Typecheck service
        working-directory: service
        run: python -m mypy printer

  mcp-server:
    name: mcp-server py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install MCP server
        run: python -m pip install -e 'mcp-server[dev]'
      - name: Test MCP server
        run: python -m pytest mcp-server/tests
      - name: Lint MCP server
        run: python -m ruff check mcp-server
      - name: Typecheck MCP server
        working-directory: mcp-server
        run: python -m mypy printer_mcp

  hub:
    name: hub py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install hub
        run: python -m pip install -e 'hub[dev]'
      # Hub steps run from hub/ so `import hub` resolves to the package, not the
      # same-named project dir (which shadows it as a namespace package from the
      # repo root). Tests run on SQLite, so no Postgres service is needed.
      - name: Test hub
        working-directory: hub
        run: python -m pytest tests
      - name: Lint hub
        working-directory: hub
        run: python -m ruff check hub tests
      - name: Typecheck hub
        working-directory: hub
        run: python -m mypy hub

  hub-production-install:
    name: hub production install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install hub like Railway
        run: python -m pip install -c hub/constraints.txt ./hub
      - name: Smoke installed hub package data
        working-directory: /tmp
        run: |
          python - <<'PY'
          from importlib.resources import files

          import hub
          import hub.app

          assert hub.__version__
          assert (files("hub") / "static" / "app.css").is_file()
          assert (files("hub") / "templates" / "base.html").is_file()
          assert hasattr(hub.app, "create_app")
          PY

  design:
    name: design py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install printer-core (editable sibling for design)
        run: python -m pip install -e ./printer-core
      - name: Install design
        run: python -m pip install -e 'design[dev]'
      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium
      - name: Test design (fast)
        run: python -m pytest design/tests -m "not slow"
      - name: Test design (slow / integration)
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        run: python -m pytest design/tests
      - name: Lint design
        run: python -m ruff check design/tprint_design design/tests
      - name: Typecheck design
        working-directory: design
        run: python -m mypy tprint_design
